<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Will Mestre Supremo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    h1 {
      color: white;
      font-size: 3rem;
      text-align: center;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.03);
      }
      100% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <h1>Will Mestre Supremo do Operacional ⚡</h1>
</body>
</html>
